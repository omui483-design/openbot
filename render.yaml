services:
  - type: web
    name: openclaw-gateway
    runtime: node
    plan: free
    buildCommand: pnpm install --prod && pnpm build
    startCommand: bash start-railway.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENCLAW_GATEWAY_MODE
        value: local
      - key: OPENCLAW_STATE_DIR
        value: /opt/render/project/data
      - key: OPENCLAW_GATEWAY_BIND
        value: auto
      - key: NODE_OPTIONS
        value: --max-old-space-size=450
      - key: OPENCLAW_LOG_LEVEL
        value: info
      # Add your secrets in Render dashboard
      - key: OPENCLAW_GATEWAY_TOKEN
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
